<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whacky Hijinks Joe FPS</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
    touch-action: none;
    user-select: none;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background: #111;
    touch-action: none;
  }

  #start {
    position: fixed;
    inset: 0;
    background: linear-gradient(#151515, #332200);
    color: white;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  #startBox {
    max-width: 520px;
    border: 4px solid #ffcc00;
    border-radius: 20px;
    padding: 24px;
    background: rgba(0,0,0,0.65);
    box-shadow: 0 0 30px rgba(255,204,0,0.45);
  }

  h1 {
    color: #ffcc00;
    font-size: 34px;
    margin: 0 0 12px;
  }

  #startBtn {
    font-size: 24px;
    padding: 14px 28px;
    border: none;
    border-radius: 14px;
    background: #ffcc00;
    font-weight: bold;
  }

  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: white;
    font-size: 18px;
    text-shadow: 2px 2px 4px black;
    background: rgba(0,0,0,0.35);
    padding: 8px 10px;
    border-radius: 10px;
  }

  #crosshair {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: white;
    z-index: 9;
    font-size: 34px;
    text-shadow: 2px 2px 4px black;
    pointer-events: none;
  }

  .pad {
    position: fixed;
    z-index: 12;
    bottom: 20px;
  }

  #movePad {
    left: 18px;
    width: 170px;
    height: 170px;
  }

  #actionPad {
    right: 18px;
    width: 170px;
    height: 170px;
  }

  .ctrl {
    position: absolute;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    border: 2px solid white;
    background: rgba(255, 204, 0, 0.88);
    font-size: 24px;
    font-weight: bold;
    color: #111;
  }

  #forward { left: 57px; top: 0; }
  #back { left: 57px; bottom: 0; }
  #left { left: 0; top: 57px; }
  #right { right: 0; top: 57px; }

  #turnLeft { left: 0; top: 57px; }
  #turnRight { right: 0; top: 57px; }

  #shoot {
    left: 45px;
    top: 38px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #ff3333;
    color: white;
    font-size: 15px;
  }

  #tip {
    position: fixed;
    bottom: 194px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: white;
    font-size: 13px;
    background: rgba(0,0,0,0.4);
    padding: 6px 10px;
    border-radius: 10px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="start">
  <div id="startBox">
    <h1>WHACKY HIJINKS JOE FPS</h1>
    <p>Walk around the house and throw cereal puffs at the Joe clones.</p>
    <p><b>Phone:</b> buttons to move, drag screen to look, THROW to shoot.</p>
    <p><b>Computer:</b> WASD to move, mouse/arrow keys to turn, Space to throw.</p>
    <button id="startBtn">START</button>
  </div>
</div>

<canvas id="game"></canvas>

<div id="hud">Score: 0 | Health: 100</div>
<div id="crosshair">+</div>
<div id="tip">Drag the screen to look around</div>

<div id="movePad" class="pad">
  <button class="ctrl" id="forward">▲</button>
  <button class="ctrl" id="back">▼</button>
  <button class="ctrl" id="left">◀</button>
  <button class="ctrl" id="right">▶</button>
</div>

<div id="actionPad" class="pad">
  <button class="ctrl" id="turnLeft">⟲</button>
  <button class="ctrl" id="turnRight">⟳</button>
  <button class="ctrl" id="shoot">THROW</button>
</div>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const joeImg = new Image();
joeImg.src = JOE_SRC;

let W = 0;
let H = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let running = false;
let score = 0;
let health = 100;
let lastTime = performance.now();
let lastShot = 0;

const player = {
  x: 0,
  y: 0,
  angle: 0
};

const controls = {
  forward: false,
  back: false,
  left: false,
  right: false,
  turnLeft: false,
  turnRight: false
};

const enemies = [];
const puffs = [];

const props = [
  {x: 5, y: 3, label: "MILK", color: "#ffffff"},
  {x: -4, y: 6, label: "CEREAL", color: "#ffcc00"},
  {x: 7, y: -6, label: "LADDER", color: "#7777ff"},
  {x: -7, y: -5, label: "TOOLS", color: "#ff3333"},
  {x: 11, y: 2, label: "SOFA", color: "#a05a2c"},
  {x: -11, y: 4, label: "BOX", color: "#cc8844"},
  {x: 2, y: 12, label: "LIGHT", color: "#ffffaa"},
  {x: -10, y: -12, label: "BOWL", color: "#cc0000"},
  {x: 14, y: -10, label: "NO MILK", color: "#ffffff"},
  {x: -15, y: 11, label: "CRASH", color: "#ff8800"}
];

function resetGame() {
  running = true;
  score = 0;
  health = 100;
  player.x = 0;
  player.y = 0;
  player.angle = 0;
  enemies.length = 0;
  puffs.length = 0;

  for (let i = 0; i < 8; i++) spawnJoe();

  document.getElementById("start").style.display = "none";
}

function spawnJoe() {
  const a = Math.random() * Math.PI * 2;
  const d = 8 + Math.random() * 12;
  enemies.push({
    x: player.x + Math.cos(a) * d,
    y: player.y + Math.sin(a) * d,
    hp: 1
  });
}

document.getElementById("startBtn").addEventListener("click", resetGame);

function bindButton(id, keyName) {
  const el = document.getElementById(id);

  function down(e) {
    e.preventDefault();
    controls[keyName] = true;
  }

  function up(e) {
    e.preventDefault();
    controls[keyName] = false;
  }

  el.addEventListener("touchstart", down, {passive:false});
  el.addEventListener("touchend", up, {passive:false});
  el.addEventListener("touchcancel", up, {passive:false});
  el.addEventListener("mousedown", down);
  el.addEventListener("mouseup", up);
  el.addEventListener("mouseleave", up);
}

bindButton("forward", "forward");
bindButton("back", "back");
bindButton("left", "left");
bindButton("right", "right");
bindButton("turnLeft", "turnLeft");
bindButton("turnRight", "turnRight");

document.getElementById("shoot").addEventListener("touchstart", function(e) {
  e.preventDefault();
  shoot();
}, {passive:false});

document.getElementById("shoot").addEventListener("click", shoot);

window.addEventListener("keydown", function(e) {
  if (e.key === "w" || e.key === "ArrowUp") controls.forward = true;
  if (e.key === "s" || e.key === "ArrowDown") controls.back = true;
  if (e.key === "a") controls.left = true;
  if (e.key === "d") controls.right = true;
  if (e.key === "ArrowLeft") controls.turnLeft = true;
  if (e.key === "ArrowRight") controls.turnRight = true;
  if (e.code === "Space") shoot();
});

window.addEventListener("keyup", function(e) {
  if (e.key === "w" || e.key === "ArrowUp") controls.forward = false;
  if (e.key === "s" || e.key === "ArrowDown") controls.back = false;
  if (e.key === "a") controls.left = false;
  if (e.key === "d") controls.right = false;
  if (e.key === "ArrowLeft") controls.turnLeft = false;
  if (e.key === "ArrowRight") controls.turnRight = false;
});

let dragging = false;
let lastX = 0;

canvas.addEventListener("pointerdown", function(e) {
  dragging = true;
  lastX = e.clientX;
});

canvas.addEventListener("pointermove", function(e) {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  lastX = e.clientX;
  player.angle += dx * 0.006;
});

canvas.addEventListener("pointerup", function() {
  dragging = false;
});

canvas.addEventListener("pointercancel", function() {
  dragging = false;
});

function shoot() {
  if (!running) return;

  const now = performance.now();
  if (now - lastShot < 220) return;
  lastShot = now;

  puffs.push({
    x: player.x + Math.cos(player.angle) * 0.7,
    y: player.y + Math.sin(player.angle) * 0.7,
    vx: Math.cos(player.angle) * 11,
    vy: Math.sin(player.angle) * 11,
    life: 1.1
  });
}

function update(dt) {
  const moveSpeed = 4.2;
  const turnSpeed = 2.6;

  if (controls.turnLeft) player.angle -= turnSpeed * dt;
  if (controls.turnRight) player.angle += turnSpeed * dt;

  let forwardMove = 0;
  let sideMove = 0;

  if (controls.forward) forwardMove += 1;
  if (controls.back) forwardMove -= 1;
  if (controls.right) sideMove += 1;
  if (controls.left) sideMove -= 1;

  const ca = Math.cos(player.angle);
  const sa = Math.sin(player.angle);

  player.x += ca * forwardMove * moveSpeed * dt;
  player.y += sa * forwardMove * moveSpeed * dt;

  player.x += -sa * sideMove * moveSpeed * dt;
  player.y += ca * sideMove * moveSpeed * dt;

  for (let i = puffs.length - 1; i >= 0; i--) {
    const p = puffs[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) puffs.splice(i, 1);
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 0.1) {
      e.x += dx / dist * 1.15 * dt;
      e.y += dy / dist * 1.15 * dt;
    }

    if (dist < 1.1) {
      health -= 18 * dt;
    }

    for (let j = puffs.length - 1; j >= 0; j--) {
      const p = puffs[j];
      const hx = e.x - p.x;
      const hy = e.y - p.y;
      const hitDist = Math.sqrt(hx * hx + hy * hy);

      if (hitDist < 0.9) {
        enemies.splice(i, 1);
        puffs.splice(j, 1);
        score += 10;
        spawnJoe();
        break;
      }
    }
  }

  if (health <= 0) {
    running = false;
    document.getElementById("start").style.display = "flex";
    document.getElementById("startBox").innerHTML = `
      <h1>JOE CHAOS OVERLOAD!</h1>
      <p>Final Score: ${score}</p>
      <button id="startBtn2">PLAY AGAIN</button>
    `;
    document.getElementById("startBtn2").addEventListener("click", resetGame);
  }

  document.getElementById("hud").textContent =
    "Score: " + score + " | Health: " + Math.max(0, Math.floor(health)) +
    " | X: " + player.x.toFixed(1) + " Y: " + player.y.toFixed(1);
}

function project(x, y) {
  const dx = x - player.x;
  const dy = y - player.y;

  const ca = Math.cos(player.angle);
  const sa = Math.sin(player.angle);

  const z = dx * ca + dy * sa;
  const side = -dx * sa + dy * ca;

  if (z <= 0.2) return null;

  const fov = W * 0.85;
  const sx = W / 2 + side / z * fov;
  const groundY = H * 0.52 + H * 0.42 / z;
  const scale = Math.min(900, 260 / z);

  if (sx < -300 || sx > W + 300) return null;

  return {sx, groundY, scale, z};
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  sky.addColorStop(0, "#7dd3ff");
  sky.addColorStop(1, "#f7d18b");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * 0.55);

  ctx.fillStyle = "#c7965d";
  ctx.fillRect(0, H * 0.43, W, H * 0.14);

  ctx.fillStyle = "#5b3921";
  ctx.fillRect(0, H * 0.55, W, H * 0.45);

  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = 1;

  for (let i = 0; i < 18; i++) {
    const y = H * 0.56 + i * 28;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  for (let i = -12; i <= 12; i++) {
    const x = W / 2 + i * 70;
    ctx.beginPath();
    ctx.moveTo(x, H * 0.55);
    ctx.lineTo(W / 2 + i * 170, H);
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.font = "bold 22px Arial";
  ctx.textAlign = "center";
  ctx.fillText("WHACKY HOUSE ARENA", W / 2, 42);
}

function drawProp(o) {
  const p = project(o.x, o.y);
  if (!p) return;

  const w = Math.max(22, p.scale * 0.7);
  const h = Math.max(28, p.scale * 0.9);

  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath();
  ctx.ellipse(p.sx, p.groundY + 6, w * 0.6, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = o.color;
  ctx.fillRect(p.sx - w / 2, p.groundY - h, w, h);

  ctx.strokeStyle = "#111";
  ctx.lineWidth = 3;
  ctx.strokeRect(p.sx - w / 2, p.groundY - h, w, h);

  ctx.fillStyle = "#111";
  ctx.font = "bold " + Math.max(10, p.scale * 0.13) + "px Arial";
  ctx.textAlign = "center";
  ctx.fillText(o.label, p.sx, p.groundY - h / 2);
}

function drawEnemy(e) {
  const p = project(e.x, e.y);
  if (!p) return;

  const imgW = Math.max(48, p.scale * 1.35);
  const imgH = imgW * 0.84;

  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.beginPath();
  ctx.ellipse(p.sx, p.groundY + 8, imgW * 0.38, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.6)";
  ctx.shadowBlur = 12;
  ctx.drawImage(joeImg, p.sx - imgW / 2, p.groundY - imgH, imgW, imgH);
  ctx.restore();

  ctx.fillStyle = "white";
  ctx.font = "bold " + Math.max(12, p.scale * 0.13) + "px Arial";
  ctx.textAlign = "center";
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.strokeText("JOE CLONE", p.sx, p.groundY - imgH - 8);
  ctx.fillText("JOE CLONE", p.sx, p.groundY - imgH - 8);
}

function drawPuff(puff) {
  const p = project(puff.x, puff.y);
  if (!p) return;

  const r = Math.max(5, p.scale * 0.13);
  ctx.fillStyle = "#ffcc00";
  ctx.beginPath();
  ctx.arc(p.sx, p.groundY - r * 3, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#aa5500";
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawMiniMap() {
  const size = 120;
  const x0 = W - size - 12;
  const y0 = 12;

  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(x0, y0, size, size);

  ctx.strokeStyle = "white";
  ctx.strokeRect(x0, y0, size, size);

  ctx.fillStyle = "#00ff66";
  ctx.beginPath();
  ctx.arc(x0 + size / 2, y0 + size / 2, 5, 0, Math.PI * 2);
  ctx.fill();

  for (const e of enemies) {
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    const mx = x0 + size / 2 + dx * 3;
    const my = y0 + size / 2 + dy * 3;
    if (mx < x0 || mx > x0 + size || my < y0 || my > y0 + size) continue;
    ctx.fillStyle = "#ff3333";
    ctx.beginPath();
    ctx.arc(mx, my, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = "white";
  ctx.font = "10px Arial";
  ctx.textAlign = "center";
  ctx.fillText("MAP", x0 + size / 2, y0 + size - 6);
}

function drawWeapon() {
  ctx.fillStyle = "#990000";
  ctx.beginPath();
  ctx.ellipse(W / 2, H - 38, 125, 42, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#ff5555";
  ctx.beginPath();
  ctx.ellipse(W / 2, H - 52, 100, 30, 0, 0, Math.PI * 2);
  ctx.fill();

  for (let i = 0; i < 16; i++) {
    const x = W / 2 - 75 + Math.random() * 150;
    const y = H - 66 + Math.random() * 25;
    ctx.fillStyle = ["#ffcc00", "#ff3333", "#33ccff", "#66ff66"][i % 4];
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = "white";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "center";
  ctx.fillText("CEREAL BLASTER", W / 2, H - 28);
}

function draw() {
  drawBackground();

  const drawables = [];

  for (const o of props) {
    const p = project(o.x, o.y);
    if (p) drawables.push({z: p.z, type: "prop", obj: o});
  }

  for (const e of enemies) {
    const p = project(e.x, e.y);
    if (p) drawables.push({z: p.z, type: "enemy", obj: e});
  }

  drawables.sort((a, b) => b.z - a.z);

  for (const d of drawables) {
    if (d.type === "prop") drawProp(d.obj);
    if (d.type === "enemy") drawEnemy(d.obj);
  }

  for (const p of puffs) drawPuff(p);

  drawWeapon();
  drawMiniMap();
}

function loop(now) {
  const dt = Math.min(0.033, (now - lastTime) / 1000);
  lastTime = now;

  if (running) update(dt);
  draw();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
